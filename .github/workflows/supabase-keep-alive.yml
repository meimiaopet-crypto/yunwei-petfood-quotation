# =============================================================================
# Supabase 免费项目保活 —— 每 3 天自动 Ping 数据库
# -----------------------------------------------------------------------------
# Supabase 免费项目在 7 天无活动后会自动暂停（pause）。
# 本工作流通过 Supabase REST API 对业务表发起一次轻量 SELECT，
# 触发数据库活动，避免被暂停，同时也在被暂停后能自动「唤醒」。
#
# 触发频率：每周一、周四 09:00 UTC（北京时间 17:00），间隔 3 天，< 7 天阈值。
# 也可在 Actions 页面手动 Run workflow 立即测试。
#
# 必填 Secret（仓库 Settings → Secrets and variables → Actions → New repository secret）：
#   SUPABASE_ANON_KEY = 项目 Settings → API → anon public key
# （anon key 本就暴露在前端，无需 service_role，安全性足够）
# SUPABASE_URL 已硬编码在本文件（本项目固定值）。
# =============================================================================

name: Supabase Keep-Alive

on:
  schedule:
    # 周一、周四 09:00 UTC（北京时间 17:00），两次间隔 3 天，安全低于 7 天暂停阈值
    - cron: '0 9 * * 1,4'
  workflow_dispatch: {}   # 允许手动触发，便于首次验证

permissions:
  contents: read

env:
  SUPABASE_URL: https://miwkbsziywwguehqgwma.supabase.co

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate secret
        run: |
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::error::缺少 Secret SUPABASE_ANON_KEY，请在仓库 Settings → Secrets 中配置"
            exit 1
          fi
          echo "Secret 已配置，开始 Ping..."

      - name: Ping Supabase via REST API
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 依次尝试几个业务表，只要任一成功即视为「活动」已触发
          for table in quotations products customers; do
            echo "→ 尝试 SELECT FROM $table (limit 1)..."
            HTTP_CODE=$(curl -fsS -o /tmp/resp.json -w "%{http_code}" \
              -X GET "$SUPABASE_URL/rest/v1/$table?select=id&limit=1" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
              -H "Content-Type: application/json")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 成功触发数据库活动（表: $table，HTTP $HTTP_CODE）"
              cat /tmp/resp.json
              echo ""
              exit 0
            fi
            echo "  ⚠️ 表 $table 返回 HTTP $HTTP_CODE，尝试下一个"
          done
          echo "::error::所有表 Ping 均失败，请检查 SUPABASE_ANON_KEY 是否正确"
          exit 1
